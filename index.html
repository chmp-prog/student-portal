<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-screen { display: none !important; }
        .clickable { cursor: pointer; transition: color 0.2s; }
        .clickable:hover { color: #2563eb; text-decoration: underline; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen">

    <div id="login-screen" class="flex items-center justify-center h-full">
        <div class="bg-white p-8 rounded-lg shadow-md w-96 text-center">
            <h1 class="text-2xl font-bold mb-6 text-blue-600">Portal Login</h1>
            <p class="text-sm text-gray-500 mb-4">Enter Student Number or Teacher PIN</p>
            <input type="password" id="login-input" placeholder="e.g., 11-05075 or PIN" 
                   class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4 text-center">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition font-semibold">
                Log In
            </button>
            <div id="login-error" class="hidden-screen mt-4 bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded text-sm text-left shadow-sm">
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden-screen p-3 md:p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded shadow">
            <h2 class="text-2xl font-bold text-gray-800">Teacher Dashboard</h2>
            <button class="logout-btn text-red-500 font-semibold hover:text-red-700">Logout</button>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6 bg-white p-4 rounded shadow">
            <input type="text" id="admin-search" placeholder="Search Name or Student No." 
                   class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <select id="section-filter" class="px-4 py-2 border rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="All">All Sections/Blocks</option>
            </select>
            <button onclick="openAddStudentModal()" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 font-semibold shadow-sm transition whitespace-nowrap">
                + Add Student
            </button>
        </div>

        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="bg-blue-600 text-white">
                        <th class="p-3 border-b">Student No.</th>
                        <th class="p-3 border-b">Name</th>
                        <th class="p-3 border-b">1st Q</th>
                        <th class="p-3 border-b">2nd Q</th>
                        <th class="p-3 border-b">3rd Q</th>
                        <th class="p-3 border-b">4th Q</th>
                        <th class="p-3 border-b">Final</th>
                        <th class="p-3 border-b">Remarks</th>
                        <th class="p-3 border-b text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-3 text-center text-gray-400" colspan="9">Loading student data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="student-dashboard" class="hidden-screen p-3 md:p-6 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded shadow">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Student Portal</h2>
                <p id="student-info-header" class="text-gray-600">Welcome</p>
            </div>
            <button class="logout-btn text-red-500 font-semibold hover:text-red-700">Logout</button>
        </div>

        <div class="bg-white rounded-lg shadow p-4 md:p-6 mb-6">
            <div id="student-main-grades">
                </div>
            <p class="text-sm text-gray-500 mt-4 italic text-center">* Click on a quarterly grade to see the breakdown.</p>
        </div>
    </div>

    <div id="breakdown-screen" class="hidden-screen p-3 md:p-6 max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 id="breakdown-title" class="text-2xl font-bold text-gray-800">Quarter Breakdown</h2>
                <button id="back-to-dashboard-btn" class="text-blue-600 hover:underline">&larr; Back to Dashboard</button>
            </div>
            
            <div id="breakdown-content">
                </div>
        </div>
    </div>
<div id="add-student-modal" class="hidden-screen fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
            <h3 class="text-xl font-bold mb-4 text-gray-800">Add New Student</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Student Number</label>
                    <input type="text" id="new-student-id" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., 24-0001">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Full Name</label>
                    <input type="text" id="new-student-name" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Last Name, First Name">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Section / Block</label>
                    <input type="text" id="new-student-section" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., Grade 10 - Rizal">
                </div>
            </div>
            <div id="add-student-error" class="hidden text-red-600 text-sm mt-3 font-semibold"></div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeAddStudentModal()" class="px-4 py-2 text-gray-600 border rounded hover:bg-gray-50 transition font-semibold">Cancel</button>
                <button id="save-new-student-btn" onclick="saveNewStudent()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition font-semibold">Save Student</button>
            </div>
        </div>
    </div>
    <script>
        // Paste your Google Apps Script Web App URL here:
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxZErghqvZ2kFaVMGyefYa4vzPf-KrvyUP43kL0f8B86GUltZVeshhc9VRZwOFaKY1ghQ/exec"; 
        
        let currentAdminData = [];
        let currentStudentData = null;
        let adminPin = "";

        const screens = {
            login: document.getElementById('login-screen'),
            admin: document.getElementById('admin-dashboard'),
            student: document.getElementById('student-dashboard'),
            breakdown: document.getElementById('breakdown-screen')
        };
        const loginBtn = document.getElementById('login-btn');
        const loginInput = document.getElementById('login-input');
        const loginError = document.getElementById('login-error');
        const logoutBtns = document.querySelectorAll('.logout-btn');

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.add('hidden-screen'));
            screens[screenName].classList.remove('hidden-screen');
        }

        loginBtn.addEventListener('click', async () => {
            const inputVal = loginInput.value.trim();
            if (!inputVal) return;

            loginBtn.innerText = "Loading...";
            loginBtn.disabled = true;
            loginError.classList.add('hidden-screen');

            try {
                if (inputVal.length <= 6 && !isNaN(inputVal) && !inputVal.includes("-")) {
                    const res = await apiCall({ action: "adminLogin", pin: inputVal });
                    if (res.success) {
                        adminPin = inputVal;
                        await loadAdminDashboard();
                        showScreen('admin');
                    } else {
                        throw new Error("Invalid Teacher PIN.");
                    }
                } else {
                    const res = await apiCall({ action: "getStudent", studentNumber: inputVal });
                    
                    // THE FIX IS HERE: We now strictly check if Google found their grades!
                    if (res && res.grades) {
                        currentStudentData = res;
                        renderStudentDashboard();
                        showScreen('student');
                    } else {
                        throw new Error("Student not found. Please check your Student Number.");
                    }
                }
            } catch (error) {
                // This triggers the red alert box you requested
                loginError.innerText = error.message || "Login failed. Try again.";
                loginError.classList.remove('hidden-screen');
            }

            loginBtn.innerText = "Log In";
            loginBtn.disabled = false;
        });

        logoutBtns.forEach(btn => btn.addEventListener('click', () => {
            loginInput.value = "";
            adminPin = "";
            currentStudentData = null;
            showScreen('login');
        }));

        function renderStudentDashboard() {
            document.getElementById('student-info-header').innerText = `Student No: ${currentStudentData.studentNumber}`;
            const container = document.getElementById('student-main-grades');
            const g = currentStudentData.grades;

            if (!g) {
                container.innerHTML = `<p class="p-3 text-gray-500 text-center">No grades posted yet.</p>`;
                return;
            }

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-6 gap-4 text-center items-center">
                    <div class="flex justify-between md:flex-col p-3 border-b md:border-none">
                        <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">1st Quarter</span>
                        <span class="text-xl font-bold text-blue-600 clickable" onclick="openBreakdown('1st')">${g.q1 || '-'}</span>
                    </div>
                    <div class="flex justify-between md:flex-col p-3 border-b md:border-none">
                        <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">2nd Quarter</span>
                        <span class="text-xl font-bold text-blue-600 clickable" onclick="openBreakdown('2nd')">${g.q2 || '-'}</span>
                    </div>
                    <div class="flex justify-between md:flex-col p-3 border-b md:border-none">
                        <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">3rd Quarter</span>
                        <span class="text-xl font-bold text-blue-600 clickable" onclick="openBreakdown('3rd')">${g.q3 || '-'}</span>
                    </div>
                    <div class="flex justify-between md:flex-col p-3 border-b md:border-none">
                        <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">4th Quarter</span>
                        <span class="text-xl font-bold text-blue-600 clickable" onclick="openBreakdown('4th')">${g.q4 || '-'}</span>
                    </div>
                    <div class="flex justify-between md:flex-col p-3 border-b md:border-none bg-gray-50 rounded-lg">
                        <span class="font-bold text-gray-800 md:mb-2 text-left md:text-center">Final Grade</span>
                        <span class="text-xl font-bold text-gray-900">${g.final || '-'}</span>
                    </div>
                    <div class="flex justify-between md:flex-col p-3">
                        <span class="font-bold text-gray-800 md:mb-2 text-left md:text-center">Remarks</span>
                        <span class="text-xl font-bold ${g.remarks === 'Passed' ? 'text-green-600' : 'text-red-600'}">${g.remarks || '-'}</span>
                    </div>
                </div>
            `;
        }

        function openBreakdown(quarter) {
            const breakdown = currentStudentData.breakdowns.find(b => b.quarter.toString().includes(quarter.replace(/\D/g, '')));
            const container = document.getElementById('breakdown-content');
            document.getElementById('breakdown-title').innerText = `${quarter} Quarter Breakdown`;

            if (!breakdown) {
                container.innerHTML = `<p class="text-gray-500 text-center py-4">Breakdown not available yet.</p>`;
                showScreen('breakdown');
                return;
            }

            let html = `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 text-center items-center" id="breakdown-grid-row">
                        <div class="flex justify-between md:flex-col p-3 border-b md:border-none" data-field="quizzes">
                            <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">Quizzes (35%)</span>
                            <span class="text-gray-800 font-semibold text-right md:text-center value-text">${breakdown.quizzes}</span>
                        </div>
                        <div class="flex justify-between md:flex-col p-3 border-b md:border-none" data-field="participation">
                            <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">Participation (15%)</span>
                            <span class="text-gray-800 font-semibold text-right md:text-center value-text">${breakdown.participation}</span>
                        </div>
                        <div class="flex justify-between md:flex-col p-3 border-b md:border-none" data-field="attendance">
                            <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">Attendance (10%)</span>
                            <span class="text-gray-800 font-semibold text-right md:text-center value-text">${breakdown.attendance}</span>
                        </div>
                        <div class="flex justify-between md:flex-col p-3 border-b md:border-none" data-field="exams">
                            <span class="font-bold text-gray-600 md:mb-2 text-left md:text-center">Exams (40%)</span>
                            <span class="text-gray-800 font-semibold text-right md:text-center value-text">${breakdown.exams}</span>
                        </div>
                        <div class="flex justify-between md:flex-col p-3 text-blue-600 font-bold">
                            <span class="text-gray-600 md:text-blue-600 text-left md:text-center">Total Grade</span>
                            <span class="text-right md:text-center text-xl" id="bd-total">${breakdown.total}</span>
                        </div>
                    </div>
            `;

            if (adminPin !== "") {
                html += `
                    <div class="mt-6 flex justify-end border-t pt-4">
                        <button id="bd-edit-btn" onclick="toggleBreakdownEditResponsive(this, '${quarter}')" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 font-semibold shadow-sm transition">
                            Edit Breakdown
                        </button>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
            showScreen('breakdown');
        }

        document.getElementById('back-to-dashboard-btn').addEventListener('click', () => {
            if (adminPin !== "") {
                showScreen('admin');
            } else {
                showScreen('student');
            }
        });

        async function loadAdminDashboard() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = `<tr><td class="p-3 text-center text-gray-400" colspan="9">Loading student data...</td></tr>`;
            
            const res = await apiCall({ action: "getAllGrades", pin: adminPin });
            if (res && Array.isArray(res)) {
                currentAdminData = res;
                populateSectionFilter();
                renderAdminTable(currentAdminData);
            }
        }

        function renderAdminTable(dataToRender) {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = "";

            dataToRender.forEach((student) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 border-b";
                tr.innerHTML = `
                    <td class="p-3">${student.studentNumber}</td>
                    <td class="p-3 font-semibold">${student.name}</td>
                    <td class="p-3 clickable text-blue-600" data-field="q1" onclick="openAdminBreakdown(this, '${student.studentNumber}', '1st')">${student.q1 || '-'}</td>
                    <td class="p-3 clickable text-blue-600" data-field="q2" onclick="openAdminBreakdown(this, '${student.studentNumber}', '2nd')">${student.q2 || '-'}</td>
                    <td class="p-3 clickable text-blue-600" data-field="q3" onclick="openAdminBreakdown(this, '${student.studentNumber}', '3rd')">${student.q3 || '-'}</td>
                    <td class="p-3 clickable text-blue-600" data-field="q4" onclick="openAdminBreakdown(this, '${student.studentNumber}', '4th')">${student.q4 || '-'}</td>
                    <td class="p-3 font-bold bg-gray-100">${student.final || '-'}</td>
                    <td class="p-3 font-bold ${student.remarks === 'Passed' ? 'text-green-600' : 'text-red-600'}">${student.remarks || '-'}</td>
                    <td class="p-3 text-center">
                        <button onclick="toggleEdit(this, '${student.studentNumber}')" class="text-blue-600 hover:text-blue-800 font-semibold px-2">Edit</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('admin-search').addEventListener('input', (e) => {
            filterAdminTable(e.target.value.toLowerCase(), document.getElementById('section-filter').value);
        });

        document.getElementById('section-filter').addEventListener('change', (e) => {
            filterAdminTable(document.getElementById('admin-search').value.toLowerCase(), e.target.value);
        });

        function populateSectionFilter() {
            const select = document.getElementById('section-filter');
            const sections = [...new Set(currentAdminData.map(s => s.section))];
            select.innerHTML = `<option value="All">All Sections/Blocks</option>` + 
                sections.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function filterAdminTable(searchTerm, sectionFilter) {
            const filtered = currentAdminData.filter(s => {
                const matchesSearch = s.name.toLowerCase().includes(searchTerm) || s.studentNumber.toString().includes(searchTerm);
                const matchesSection = sectionFilter === "All" || s.section === sectionFilter;
                return matchesSearch && matchesSection;
            });
            renderAdminTable(filtered);
        }

        async function openAdminBreakdown(cellElement, studentNumber, quarter) {
            if (cellElement.querySelector('input')) return;

            const originalText = cellElement.innerText;
            cellElement.innerText = "...";

            try {
                const res = await apiCall({ action: "getStudent", studentNumber: studentNumber });
                if (res && res.studentNumber) {
                    currentStudentData = res;
                    openBreakdown(quarter);
                } else {
                    alert("Could not load details.");
                }
            } catch (error) {
                alert("Error connecting to database.");
            } finally {
                cellElement.innerText = originalText;
            }
        }

        async function toggleEdit(btn, studentNumber) {
            const tr = btn.closest('tr');
            const isEditing = btn.innerText === "Save";

            if (!isEditing) {
                ['q1', 'q2', 'q3', 'q4'].forEach(field => {
                    const td = tr.querySelector(`td[data-field="${field}"]`);
                    const val = td.innerText === '-' ? '' : td.innerText;
                    td.innerHTML = `<input type="number" class="w-16 border rounded px-1 text-center" value="${val}" data-original="${val}">`;
                });
                
                btn.innerText = "Save";
                btn.classList.replace('text-blue-600', 'text-green-600');
                
                const cancelBtn = document.createElement('button');
                cancelBtn.innerText = "Cancel";
                cancelBtn.className = "text-gray-500 hover:text-gray-700 font-semibold px-2 ml-2 cancel-btn";
                cancelBtn.onclick = () => {
                    ['q1', 'q2', 'q3', 'q4'].forEach(field => {
                        const td = tr.querySelector(`td[data-field="${field}"]`);
                        td.innerHTML = td.querySelector('input').getAttribute('data-original') || '-';
                    });
                    btn.innerText = "Edit";
                    btn.classList.replace('text-green-600', 'text-blue-600');
                    btn.disabled = false;
                    cancelBtn.remove();
                };
                btn.parentNode.appendChild(cancelBtn);
            } else {
                btn.innerText = "Saving...";
                btn.disabled = true;
                const updatedGrades = {};
                
                ['q1', 'q2', 'q3', 'q4'].forEach(field => {
                    const input = tr.querySelector(`td[data-field="${field}"] input`);
                    updatedGrades[field] = input.value === '' ? '' : Number(input.value);
                });

                const res = await apiCall({
                    action: "saveGrades",
                    pin: adminPin,
                    studentNumber: studentNumber,
                    grades: updatedGrades
                });

                if (res.success) {
                    await loadAdminDashboard();
                } else {
                    alert("Failed to save grades.");
                    btn.innerText = "Save";
                    btn.disabled = false;
                }
            }
        }

        async function toggleBreakdownEditResponsive(btn, quarter) {
            const gridRow = document.getElementById('breakdown-grid-row');
            const isEditing = btn.innerText === "Save Changes";

            if (!isEditing) {
                ['quizzes', 'participation', 'attendance', 'exams'].forEach(field => {
                    const container = gridRow.querySelector(`div[data-field="${field}"]`);
                    const textSpan = container.querySelector('.value-text');
                    const val = textSpan.innerText === '-' || textSpan.innerText === '' ? '' : textSpan.innerText;
                    textSpan.innerHTML = `<input type="number" class="w-20 border rounded px-2 py-1 text-center bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none" value="${val}" data-original="${val}">`;
                });
                
                btn.innerText = "Save Changes";
                btn.className = "bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700 font-semibold shadow-sm transition";
                
                const cancelBtn = document.createElement('button');
                cancelBtn.innerText = "Cancel";
                cancelBtn.className = "text-gray-600 hover:text-gray-800 font-semibold px-4 py-2 ml-3 border rounded-md bg-white hover:bg-gray-50 transition cancel-btn";
                cancelBtn.onclick = () => {
                    ['quizzes', 'participation', 'attendance', 'exams'].forEach(field => {
                        const container = gridRow.querySelector(`div[data-field="${field}"]`);
                        const textSpan = container.querySelector('.value-text');
                        textSpan.innerHTML = textSpan.querySelector('input').getAttribute('data-original') || '-';
                    });
                    btn.innerText = "Edit Breakdown";
                    btn.className = "bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 font-semibold shadow-sm transition";
                    cancelBtn.remove();
                };
                btn.parentNode.appendChild(cancelBtn);
            } else {
                btn.innerText = "Saving...";
                btn.disabled = true;
                
                const updatedBreakdown = {};
                ['quizzes', 'participation', 'attendance', 'exams'].forEach(field => {
                    const container = gridRow.querySelector(`div[data-field="${field}"]`);
                    const input = container.querySelector('.value-text input');
                    updatedBreakdown[field] = input.value === '' ? 0 : Number(input.value);
                });

                const res = await apiCall({
                    action: "saveBreakdown",
                    pin: adminPin,
                    studentNumber: currentStudentData.studentNumber,
                    quarter: quarter,
                    breakdown: updatedBreakdown
                });

                if (res.success) {
                    document.getElementById('bd-total').innerText = res.newTotal;
                    ['quizzes', 'participation', 'attendance', 'exams'].forEach(field => {
                        const container = gridRow.querySelector(`div[data-field="${field}"]`);
                        const textSpan = container.querySelector('.value-text');
                        textSpan.innerHTML = updatedBreakdown[field];
                    });
                    
                    btn.innerText = "Edit Breakdown";
                    btn.className = "bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 font-semibold shadow-sm transition";
                    btn.disabled = false;
                    
                    const cancelBtn = btn.parentNode.querySelector('.cancel-btn');
                    if (cancelBtn) cancelBtn.remove();
                    
                    await loadAdminDashboard();
                } else {
                    alert("Failed to save breakdown.");
                    btn.innerText = "Save Changes";
                    btn.disabled = false;
                }
            }
        }
// ==========================================
        // 6. ADD STUDENT LOGIC
        // ==========================================
        function openAddStudentModal() {
            document.getElementById('add-student-modal').classList.remove('hidden-screen');
            document.getElementById('new-student-id').value = '';
            document.getElementById('new-student-name').value = '';
            document.getElementById('new-student-section').value = '';
            document.getElementById('add-student-error').classList.add('hidden');
        }

        function closeAddStudentModal() {
            document.getElementById('add-student-modal').classList.add('hidden-screen');
        }

        async function saveNewStudent() {
            const id = document.getElementById('new-student-id').value.trim();
            const name = document.getElementById('new-student-name').value.trim();
            const section = document.getElementById('new-student-section').value.trim();
            const errorDiv = document.getElementById('add-student-error');
            const btn = document.getElementById('save-new-student-btn');

            if (!id || !name || !section) {
                errorDiv.innerText = "Please fill in all fields.";
                errorDiv.classList.remove('hidden');
                return;
            }

            btn.innerText = "Saving...";
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                const res = await apiCall({
                    action: "addStudent",
                    pin: adminPin,
                    studentData: { studentNumber: id, name: name, section: section }
                });

                if (res.success) {
                    closeAddStudentModal();
                    await loadAdminDashboard(); // Automatically refresh the table to show the new student!
                } else {
                    errorDiv.innerText = res.message || "Failed to add student.";
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = "Error connecting to database.";
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerText = "Save Student";
                btn.disabled = false;
            }
        }
        async function apiCall(payload) {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                throw error;
            }
        }
    </script>
